    <text x="240" y="326" fill="#a855f7">Threat Intelligence</text>
    <text x="444" y="326" fill="#34d399">Case Intelligence</text>
  </g>

  <rect x="76" y="362" width="600" height="3" rx="2" fill="url(#accent)"/>
  <text x="76" y="405" fill="#7896ad" font-family="monospace" font-size="16">
    Desktop Support Technician • Cybersecurity Student • Python Developer
