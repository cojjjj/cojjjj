<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="500" viewBox="0 0 1400 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="500">
      <stop stop-color="#05070d"/>
      <stop offset="0.48" stop-color="#07111f"/>
      <stop offset="1" stop-color="#100616"/>
    </linearGradient>
    <linearGradient id="accent" x1="160" y1="90" x2="1180" y2="390">
      <stop stop-color="#38bdf8"/>
      <stop offset="0.5" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" fill="none" stroke="#15304a" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1400" height="500" rx="26" fill="url(#bg)"/>
  <rect width="1400" height="500" rx="26" fill="url(#grid)" opacity=".58"/>
  <rect x="18" y="18" width="1364" height="464" rx="20" fill="none" stroke="#1c4668" stroke-width="2"/>

  <text x="74" y="76" fill="#79a7c5" font-family="monospace" font-size="18" letter-spacing="4">BLACKTERM // OPERATOR CONSOLE</text>
  <text x="72" y="178" fill="url(#accent)" font-family="monospace" font-size="78" font-weight="800" letter-spacing="3">BLACKTERM</text>
  <text x="76" y="228" fill="#edf7ff" font-family="monospace" font-size="27">Autonomous Cyber Investigation Platform</text>

  <g font-family="monospace" font-size="17">
