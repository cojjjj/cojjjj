    <circle r="98" fill="none" stroke="#0ea5e9" stroke-width="2"/>
    <circle r="57" fill="none" stroke="#a855f7" stroke-width="2"/>
    <path d="M-136 0H136M0-136V136M-96-96L96 96M96-96L-96 96" stroke="#173a56"/>
    <circle cx="-56" cy="24" r="7" fill="#38bdf8"/>
